name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-binary:
    name: Build Static Binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Install protoc
        run: |
          curl -OL https://github.com/protocolbuffers/protobuf/releases/download/v29.5/protoc-29.5-linux-x86_64.zip
          sudo unzip protoc-29.5-linux-x86_64.zip -d /usr/local
          rm protoc-29.5-linux-x86_64.zip

      - uses: Swatinem/rust-cache@v2

      - name: Build musl binary
        env:
          RUSTFLAGS: "-C target-feature=+crt-static -C relocation-model=static"
        run: cargo build --release --target x86_64-unknown-linux-musl -p omem-server --no-default-features

      - name: Package binary
        run: |
          cd target/x86_64-unknown-linux-musl/release
          tar czf omem-server-${{ github.ref_name }}-linux-amd64.tar.gz omem-server
          sha256sum omem-server-${{ github.ref_name }}-linux-amd64.tar.gz > SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: binary-amd64
          path: |
            target/x86_64-unknown-linux-musl/release/omem-server-*.tar.gz
            target/x86_64-unknown-linux-musl/release/SHA256SUMS

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/mingxy-cerebro/cerebro-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    needs: [build-binary]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binary-amd64
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/omem-server-*.tar.gz
            artifacts/SHA256SUMS
